# AquaSentinel default configuration.

data:
  network_json: data/network_topology.json     # pipeline graph G = (V, E)
  normal_states_csv: data/normal_states.csv    # [T, N, F] normal operation
  num_features: 2                              # flow velocity, water depth

training:
  window: 12               # input window length (12 steps = 2 hours at 10 min)
  batch_size: 32
  epochs: 50
  lr: 0.001
  ssl_weight: 0.1          # weight of ST-SSL auxiliary loss
  checkpoint_dir: checkpoints

moe:
  lam: 5.0                 # gating temperature (Eq. 8)
  ema_alpha: 0.1           # smoothing factor for per-expert loss

rtca:
  eps: 1.0e-6
  window: 6                # W: cumulative error window
  alpha: 0.05              # EMA factor for adaptive statistics
  k1: 2.5                  # real-time threshold multiplier
  k2: 3.0                  # cumulative threshold multiplier
  persistence: 3           # T: consecutive steps to confirm
  warmup: 24               # steps before thresholds activate

placement:
  alpha: 0.5               # weight of betweenness centrality
  beta: 0.3                # weight of hydraulic significance
  gamma: 0.2               # weight of risk factor
  k: 6                     # sensor budget
  d_min: 2                 # minimum pairwise hop distance

physics:
  lam_smooth: 0.1
  lr: 0.05
  iterations: 500

llm_prompt_dir: prompts
llm:
  backend: anthropic       # anthropic | openai
  model: claude-sonnet-4-6
  max_tokens: 1500
  temperature: 0.2
  api_key_env: LLM_API_KEY
  base_url: ""             # required only for the openai backend
